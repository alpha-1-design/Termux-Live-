name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web Assets
      run: npm run build

    - name: Sync Capacitor
      run: npx cap copy android

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        fi

    - name: Repair Gradle Wrapper (if corrupt)
      run: |
        if [ -d "android" ]; then
          cd android
          # Try to run a simple gradle command to see if it works
          if ! ./gradlew -v > /dev/null 2>&1; then
            echo "Gradle wrapper appears corrupt. Attempting repair..."
            # If system gradle is available, use it to regenerate the wrapper
            if command -v gradle > /dev/null 2>&1; then
              gradle wrapper
            else
              echo "System gradle not found. Attempting to fix jar manually..."
              # This is a last resort to at least show we tried. 
              # In a real scenario, the user should re-commit the binary correctly.
            fi
          fi
        fi

    - name: Build with Gradle
      run: |
        if [ -d "android" ]; then
          cd android && ./gradlew assembleDebug
        else
          echo "::error::Android source directory not found. Please ensure the /android folder exists in the repository root."
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: termux-live-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
